# Local pre-commit hooks. They reuse the Python venv already used by
# the pipeline, so there is nothing to network-fetch on install. Run
# ``pre-commit install`` once after cloning to activate them; see
# ``docs/DEVELOPMENT.md`` for the full bootstrap.

repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check (pipeline)
        entry: pipeline/.venv/bin/ruff check pipeline/src pipeline/tests
        language: system
        pass_filenames: false
        files: ^pipeline/
      - id: ruff-format
        name: ruff format --check (pipeline)
        entry: pipeline/.venv/bin/ruff format --check pipeline/src pipeline/tests
        language: system
        pass_filenames: false
        files: ^pipeline/
      - id: mypy-strict
        name: mypy --strict (pipeline)
        entry: bash -c 'cd pipeline && .venv/bin/mypy --strict src tests'
        language: system
        pass_filenames: false
        files: ^pipeline/
      - id: pytest-unit
        name: pytest tests/unit (pipeline)
        entry: bash -c 'cd pipeline && .venv/bin/pytest tests/unit -q --no-cov'
        language: system
        pass_filenames: false
        files: ^pipeline/
      # NOTA: gli hook di Layer 2 (eslint/prettier/tsc/jest su node_modules) sono
      # stati rimossi con la demolizione di React Native (commit d4c839c). L'app è
      # ora Swift/UIKit puro (ScaboCore + ScaboApp): puntavano a binari JS
      # inesistenti e avrebbero bloccato ogni commit che tocca app/. La suite Swift
      # gira via app/ios/scripts/validate.sh (swift test + xcodebuild test): troppo
      # lenta per un gate per-commit, quindi NON è agganciata a pre-commit.
